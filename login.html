<!DOCTYPE html>
<meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  
</head>
 
<body>
 
  <div class="screen">
 
    <div class="holo-frame">
      <div class="holo-content">
 
        <h2 class="title">EMERGENCY ACCESS</h2>
 
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
 
        <form method="POST" action="{{ url_for('login') }}">
 
          <div class="input-group">
            <input type="email" name="email" placeholder="EMAIL" required>
          </div>
 
          <div class="input-group">
            <input type="password" name="password" placeholder="PASSWORD" required>
          </div>
 
          <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="{{ url_for('forgot_password')}}">Forgot Password?</a>
          </div>
 
          <div class="btn-group">
            <button type="submit" class="btn login-btn">LOGIN</button>
            <a href="{{ url_for('register') }}" class="btn register-btn">REGISTER</a>
          </div>
 
        </form>
 
        <!-- Admin access — added below the form -->
        <div class="admin-divider">ADMIN</div>
        <a href="{{ url_for('admin_login') }}" class="admin-access-link">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
          ADMIN PANEL
        </a>
 
      </div>
    </div>
  </div>
 
</body>
</html>
