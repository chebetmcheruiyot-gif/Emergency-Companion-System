services:
  - type: web
    name: emergency-alert-system
    runtime: python
    rootDir: .   # or remove this line entirely
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true